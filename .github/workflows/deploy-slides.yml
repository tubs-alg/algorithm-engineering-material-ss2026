name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render slides
        run: |
          for qmd in slides/*/L*.qmd; do
            quarto render "$qmd"
          done

      - name: Assemble site
        run: |
          mkdir -p _site
          for dir in slides/*/; do
            [ "$dir" = "slides/*/" ] && continue
            name=$(basename "$dir")
            mkdir -p "_site/$name"
            # Copy rendered HTML, PDFs, and all assets
            cp -r "$dir"*.html "$dir"*_files "_site/$name/" 2>/dev/null || true
            cp "$dir"*.pdf "_site/$name/" 2>/dev/null || true
            cp -r "$dir/assets" "_site/$name/assets" 2>/dev/null || true
          done
          cp slides/index.html _site/index.html 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
